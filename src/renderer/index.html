<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vortex File Manager</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/address-bar.css">
  <link rel="stylesheet" href="css/file-list.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/context-menu.css">
  <link rel="stylesheet" href="css/dialogs.css">
  <link rel="stylesheet" href="css/drag-drop.css">
  <link rel="stylesheet" href="css/thispc.css">
  <link rel="stylesheet" href="css/preview/image-preview.css">
</head>
<body>

<div class="app-container">

  <!-- ═══════════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════════ -->
  <header class="header">

    <!-- App Icon & Title -->
    <div class="app-branding">
      <div class="app-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="app-title">Vortex</span>
    </div>

    <!-- Nav buttons -->
    <div class="nav-buttons">
      <button class="nav-btn" id="btn-back" title="Back (Alt+←)" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <button class="nav-btn" id="btn-forward" title="Forward (Alt+→)" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
      <button class="nav-btn" id="btn-up" title="Up (Alt+↑)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
      </button>
      <button class="nav-btn" id="btn-refresh" title="Refresh (F5)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      </button>
    </div>

    <div class="hdr-sep"></div>

    <!-- Search -->
    <div class="search-container">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-bar" id="search-input" placeholder="Search files..." autocomplete="off" spellcheck="false">
        <button class="search-clear" id="search-clear">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="search-suggestions" id="search-suggestions"></div>
    </div>

    <div class="hdr-sep"></div>

    <!-- New Folder / New File toolbar buttons -->
    <button class="toolbar-action-btn" id="btn-new-folder" title="New Folder (Ctrl+Shift+N)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    </button>
    <button class="toolbar-action-btn" id="btn-new-file" title="New File (Ctrl+N)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </button>

    <div class="hdr-sep"></div>

    <!-- View buttons -->
    <div class="view-buttons">
      <button class="view-btn active" id="btn-view-grid" title="Grid (Ctrl+1)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="btn-view-list" title="List (Ctrl+2)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="view-btn" id="btn-view-details" title="Details (Ctrl+3)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
    </div>

    <button class="view-btn" id="btn-dual-pane" title="Dual Pane" style="margin-left:2px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
    </button>

    <!-- Window controls (Windows-style) -->
    <div class="window-controls">
      <button class="wc-btn minimize" id="btn-min" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="6" x2="10" y2="6"/>
        </svg>
      </button>
      <button class="wc-btn maximize" id="btn-max" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="8" height="8"/>
        </svg>
      </button>
      <button class="wc-btn close" id="btn-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="2" x2="10" y2="10"/>
          <line x1="10" y1="2" x2="2" y2="10"/>
        </svg>
      </button>
    </div>

  </header>

  <!-- ═══════════════════════════════════════════════════════
       MAIN
  ═══════════════════════════════════════════════════════ -->
  <div class="main-content">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-topbar">
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar (Ctrl+B)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="sidebar-title">Explorer</span>
      </div>

      <div class="sidebar-scroll">

        <!-- Quick Access -->
        <div class="sidebar-section">
          <div class="section-header" data-section="quick">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            <span>Quick Access</span>
            <svg class="section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="section-content" id="quick-content">
            <div class="sidebar-item" data-special="home">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
              <span class="sidebar-item-label">Home</span>
            </div>
            <div class="sidebar-item" data-special="desktop">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
              <span class="sidebar-item-label">Desktop</span>
            </div>
            <div class="sidebar-item" data-special="downloads">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span>
              <span class="sidebar-item-label">Downloads</span>
            </div>
            <div class="sidebar-item" data-special="documents">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
              <span class="sidebar-item-label">Documents</span>
            </div>
            <div class="sidebar-item" data-special="pictures">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>
              <span class="sidebar-item-label">Pictures</span>
            </div>
            <div class="sidebar-item" data-special="music">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span>
              <span class="sidebar-item-label">Music</span>
            </div>
            <div class="sidebar-item" data-special="videos">
              <span class="sidebar-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></span>
              <span class="sidebar-item-label">Videos</span>
            </div>
          </div>
        </div>

        <!-- This PC -->
        <div class="sidebar-section">
          <div class="section-header" data-section="drives">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            <span>This PC</span>
            <svg class="section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="section-content" id="drives-content">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Bookmarks -->
        <div class="sidebar-section">
          <div class="section-header" data-section="bookmarks">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            <span>Bookmarks</span>
            <svg class="section-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="section-content" id="bookmarks-content">
            <button class="sidebar-add-btn" id="add-bookmark">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>Add Bookmark</span>
            </button>
          </div>
        </div>

      </div><!-- /sidebar-scroll -->

      <div class="resize-handle" id="sidebar-resize"></div>
    </aside>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- Tab Bar -->
      <div class="tab-bar" id="tab-bar">
        <button class="new-tab-btn" id="new-tab-btn" title="New Tab (Ctrl+T)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- Address Bar -->
      <div class="address-bar-wrap">
        <div class="address-bar" id="address-bar">
          <div class="breadcrumb" id="breadcrumb"></div>
          <input type="text" class="path-input" id="path-input" spellcheck="false">
        </div>
      </div>

      <!-- File List & Preview Wrapper -->
      <div class="file-preview-wrapper" id="file-preview-wrapper">
        <!-- File List -->
        <div class="file-list-container" id="file-list-container">

          <div class="file-grid"         id="file-grid"    style="display:none"></div>
          <div class="file-list"         id="file-list"    style="display:none"></div>
          <div class="file-details-wrap" id="file-details" style="display:none"></div>

          <div class="loading-state" id="loading-state" style="display:none">
            <div class="spinner"></div>
            <span>Loading...</span>
          </div>

          <div class="empty-state" id="empty-state" style="display:none">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <h3>This folder is empty</h3>
            <p>Right-click here to create new items</p>
          </div>

        </div>
        <!-- Preview panel will be inserted here by JS -->
      </div>

    </div><!-- /content-area -->
  </div><!-- /main-content -->

  <!-- FOOTER -->
  <footer class="footer">
    <span id="selection-info">0 items</span>
    <div class="footer-sep"></div>
    <span id="size-info"></span>
    <div class="storage-indicator">
      <span id="drive-info"></span>
      <div class="storage-bar"><div class="storage-fill" id="storage-fill" style="width:0%"></div></div>
    </div>
  </footer>

</div><!-- /app-container -->

<!-- Context Menu -->
<div class="context-menu" id="context-menu" style="display:none"></div>

<!-- Dialogs container -->
<div id="dialogs-container"></div>

<!-- Scripts: order matters -->
<script src="js/core/events.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/ipc.js"></script>
<script src="js/utils/formatUtils.js"></script>
<script src="js/utils/pathUtils.js"></script>
<script src="js/utils/iconMapper.js"></script>
<script src="js/ui/dialogs.js"></script>
<script src="js/features/navigation.js"></script>
<script src="js/features/selection.js"></script>
<script src="js/features/copyPaste.js"></script>
<script src="js/features/dragDrop.js"></script>
<script src="js/features/bookmarks.js"></script>
<script src="js/features/shortcuts.js"></script>
<script src="js/features/thumbnails.js"></script>
<!-- Image Preview System -->
<script src="js/preview/components/toolbar.js"></script>
<script src="js/preview/components/viewer.js"></script>
<script src="js/preview/components/sidebar.js"></script>
<script src="js/preview/components/actions.js"></script>
<script src="js/preview/index.js"></script>
<script src="js/preview/integration.js"></script>
<script src="js/ui/footer.js"></script>
<script src="js/ui/search.js"></script>
<script src="js/ui/thisPCView.js"></script>
<script src="js/ui/contextMenu.js"></script>
<script src="js/ui/fileList.js"></script>
<script src="js/ui/addressBar.js"></script>
<script src="js/ui/tabs.js"></script>
<script src="js/ui/sidebar.js"></script>
<script src="js/ui/header.js"></script>
<script src="js/core/app.js"></script>
<script src="js/main.js"></script>

</body>
</html>
