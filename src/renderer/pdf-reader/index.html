<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Reader — Vortex</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body>

<!-- Loading overlay -->
<div class="reader-loading" id="reader-loading">
  <div class="loading-spinner"></div>
  <span class="loading-text">Loading PDF…</span>
</div>

<!-- Print dialog -->
<div class="print-overlay hidden" id="print-overlay">
  <div class="print-dialog">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#3b82f6">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print PDF
    </h2>
    <div class="print-section">
      <label class="section-label">Pages</label>
      <div class="print-options">
        <label class="print-radio active" id="opt-all">
          <input type="radio" name="pages" value="all" checked>
          All pages
          <span style="margin-left:auto;font-size:11px;color:rgba(255,255,255,0.3)" id="all-count"></span>
        </label>
        <label class="print-radio" id="opt-odd">
          <input type="radio" name="pages" value="odd"> Odd pages (1, 3, 5…)
        </label>
        <label class="print-radio" id="opt-even">
          <input type="radio" name="pages" value="even"> Even pages (2, 4, 6…)
        </label>
        <label class="print-radio" id="opt-range">
          <input type="radio" name="pages" value="range"> Custom range
        </label>
        <input type="text" class="print-range-input" id="print-range-input"
          placeholder="e.g. 1-5, 8, 11-13" disabled>
        <div class="print-range-hint">Enter page numbers or ranges separated by commas</div>
      </div>
    </div>
    <div class="print-dialog-actions">
      <button class="print-cancel-btn" id="print-cancel">Cancel</button>
      <button class="print-confirm-btn" id="print-confirm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Print
      </button>
    </div>
  </div>
</div>

<!-- Info floating tab -->
<div class="info-tab hidden" id="info-tab">
  <div class="info-tab-header">
    <span class="info-tab-title">File Info</span>
    <button class="info-tab-close" id="info-tab-close">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="info-tab-body">
    <div class="info-row">
      <span class="info-label">File</span>
      <span class="info-value" id="info-filename">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Pages</span>
      <span class="info-value" id="info-pages">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Size</span>
      <span class="info-value" id="info-size">—</span>
    </div>
    <div class="info-row" id="info-author-row" style="display:none">
      <span class="info-label">Author</span>
      <span class="info-value" id="info-author">—</span>
    </div>
    <div class="info-row" id="info-title-row" style="display:none">
      <span class="info-label">Title</span>
      <span class="info-value" id="info-title-val">—</span>
    </div>
    <div class="info-row" id="info-subject-row" style="display:none">
      <span class="info-label">Subject</span>
      <span class="info-value" id="info-subject">—</span>
    </div>
    <div class="info-row" id="info-creator-row" style="display:none">
      <span class="info-label">Creator</span>
      <span class="info-value" id="info-creator">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Path</span>
      <button class="info-copy-btn" id="info-copy-path">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
    </div>
    <div class="info-path" id="info-path">—</div>
  </div>
</div>

<!-- Main app -->
<div class="reader-app" id="reader-app">

  <!-- Toolbar (no OS window header) -->
  <div class="reader-toolbar">

    <!-- Left: PDF icon + title (draggable) -->
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span class="tb-title" id="tb-title">Loading…</span>

    <div class="tb-sep"></div>

    <!-- Page navigation -->
    <div class="tb-group">
      <button class="tb-btn" id="tb-prev" title="Previous page (←)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="tb-page-wrap">
        <input class="tb-page-input" id="tb-page" type="number" value="1" min="1">
        <span class="tb-page-total" id="tb-total">/ —</span>
      </div>
      <button class="tb-btn" id="tb-next" title="Next page (→)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Zoom -->
    <div class="tb-group">
      <button class="tb-btn" id="tb-zoom-out" title="Zoom out (−)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span class="tb-zoom-label" id="tb-zoom">100%</span>
      <button class="tb-btn" id="tb-zoom-in" title="Zoom in (+)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="tb-btn" id="tb-fit-width" title="Fit width (W)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
      <button class="tb-btn" id="tb-fit-page" title="Fit page (H)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Info button -->
    <button class="tb-btn" id="tb-info" title="File info (I)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
    </button>

    <!-- Print -->
    <button class="tb-btn primary" id="tb-print" title="Print (Ctrl+P)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Print
    </button>

    <!-- Window controls (right side) -->
    <div class="tb-sep"></div>
    <div class="wc-group">
      <button class="wc-btn minimize" id="wc-min" title="Minimize">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="6" x2="10" y2="6"/></svg>
      </button>
      <button class="wc-btn maximize" id="wc-max" title="Maximize">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="8" height="8"/></svg>
      </button>
      <button class="wc-btn close" id="wc-close" title="Close">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
      </button>
    </div>

  </div>

  <!-- Body -->
  <div class="reader-body">
    <div class="reader-sidebar" id="reader-sidebar"></div>
    <div class="reader-main" id="reader-main"></div>
  </div>

</div>

<script src="../js/preview/pdf/lib/pdf.min.js"></script>
<script src="reader.js"></script>
</body>
</html>
